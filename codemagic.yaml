# WakeUp Warrior - Codemagic CI/CD Configuration
# Build your Android app in the cloud

workflows:
  # Main workflow for debug builds (no signing required)
  android-debug:
    name: WakeUp Warrior Debug
    max_build_duration: 30
    environment:
      vars:
        PACKAGE_NAME: "com.wakeupwarrior"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
      - name: Run Lint
        script: |
          ./gradlew lintDebug
        ignore_failure: true
        
      - name: Run Unit Tests
        script: |
          ./gradlew testDebugUnitTest
        ignore_failure: true
        
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
          
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/reports/lint-results-debug.html
      
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

