---
format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android

# Trigger maps - when to run builds
trigger_map:
- push_branch: main
  workflow: primary
- push_branch: develop
  workflow: debug
- pull_request_target_branch: main
  workflow: debug
- pull_request_target_branch: develop
  workflow: debug
- tag: "*"
  workflow: release

# App configuration
app:
  envs:
  - GRADLEW_PATH: ./gradlew
  - PACKAGE_NAME: com.wakeupwarrior

# Workflows
workflows:
  # Primary workflow for main branch
  primary:
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone: {}
    - cache-pull: {}
    - script:
        title: Make gradlew executable
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            chmod +x ./gradlew
    - android-lint:
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: debug
    - android-unit-test:
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: debug
    - android-build:
        title: Build Debug APK
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: debug
        - cache_level: all
    - deploy-to-bitrise-io:
        inputs:
        - debug_mode: 'true'
        - notify_user_groups: none
    - cache-push:
        inputs:
        - cache_paths: |-
            .gradle
            ~/.gradle
            ~/.m2/repository

  # Debug workflow for develop branch and PRs
  debug:
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone: {}
    - cache-pull: {}
    - script:
        title: Make gradlew executable
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            chmod +x ./gradlew
    - android-unit-test:
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: debug
        is_always_run: true
    - android-build:
        title: Build Debug APK
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: debug
        - cache_level: all
    - deploy-to-bitrise-io:
        inputs:
        - debug_mode: 'true'
        - notify_user_groups: none
    - cache-push:
        inputs:
        - cache_paths: |-
            .gradle
            ~/.gradle
            ~/.m2/repository

  # Release workflow for tags
  release:
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone: {}
    - cache-pull: {}
    - script:
        title: Make gradlew executable
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            chmod +x ./gradlew
    - android-lint:
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: release
    - android-unit-test:
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: release
    - android-build:
        title: Build Release APK
        inputs:
        - project_location: $PROJECT_LOCATION
        - module: $MODULE
        - variant: release
        - cache_level: all
    - deploy-to-bitrise-io:
        inputs:
        - notify_user_groups: none
    - google-play-deploy:
        run_if: '{{getenv "BITRISEIO_ANDROID_KEYSTORE_URL" | ne ""}}'
        inputs:
        - service_account_json_key_path: $BITRISEIO_SERVICE_ACCOUNT_JSON_KEY_URL
        - package_name: $PACKAGE_NAME
        - track: internal
        - status: draft
    - cache-push:
        inputs:
        - cache_paths: |-
            .gradle
            ~/.gradle
            ~/.m2/repository

# Environment variables
envs:
- PROJECT_LOCATION: .
- MODULE: app
- BITRISE_PROJECT_PATH: app/build.gradle.kts
